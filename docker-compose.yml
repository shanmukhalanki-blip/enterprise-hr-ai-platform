version: "3.9"

services:
  backend:
    build: .
    container_name: enterprise-hr-ai
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: nginx:alpine
    container_name: hr-ui
    ports:
      - "3000:80"
    volumes:
      - ./hr-ui/dist:/usr/share/nginx/html
    depends_on:
      - backend
